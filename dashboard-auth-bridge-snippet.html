<!-- 1. Config must be first -->
<script src="dashboard-page-config.js"></script>

<!-- 2. Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<!-- 3. Auth bridge — checks session, handles idle logout -->
<script>
(async function dashboardAuthBridge(){
  const cfg = window.SELLERDESK_CONFIG || {};
  const IDLE_MS = cfg.IDLE_TIMEOUT_MS || 600000; // 10 min

  /* Helper: clear all sd_ keys + supabase key */
  function clearSdStorage(){
    const keys = [];
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && (k.startsWith('sd_') || k === 'sd_supabase_auth')) keys.push(k);
    }
    keys.forEach(k => localStorage.removeItem(k));
    sessionStorage.clear();
  }

  /* Helper: redirect to landing */
  function goToLanding(reason){
    const base = (cfg.SITE_URL || 'https://mysellerdesk.in');
    window.location.replace(base + '/' + (reason ? '?reason=' + reason : ''));
  }

  /* ── STEP 1: Build Supabase client (same cookie config as landing) ── */
  if(!cfg.SUPABASE_URL || !cfg.SUPABASE_ANON_KEY ||
     cfg.SUPABASE_ANON_KEY === 'PASTE_YOUR_REAL_SUPABASE_ANON_KEY_HERE'){
    console.error('Dashboard: Supabase config missing!');
    goToLanding('config_error');
    return;
  }

  const client = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, {
    auth: {
      storageKey: 'sd_supabase_auth',
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      flowType: 'pkce',
      cookieOptions: {
        domain: '.mysellerdesk.in',
        sameSite: 'Lax',
        secure: true,
        maxAge: 60 * 60 * 24 * 7
      }
    }
  });

  window._sdSupabaseClient = client; // expose for rest of dashboard

  /* ── STEP 2: Check for URL param auth=1 (just redirected from login) ── */
  const params = new URLSearchParams(window.location.search);
  if(params.get('auth') === '1'){
    // Clean URL without reload
    const cleanUrl = window.location.pathname;
    history.replaceState({}, '', cleanUrl);
  }

  /* ── STEP 3: Verify real Supabase session ── */
  const { data: { session }, error } = await client.auth.getSession();

  if(error || !session){
    // No valid session → clear storage → back to landing
    clearSdStorage();
    goToLanding('session_expired');
    return;
  }

  /* ── STEP 4: Refresh localStorage from session (safety sync) ── */
  const user = session.user;
  localStorage.setItem('sd_logged_in', '1');
  localStorage.setItem('sd_user_email', user.email || '');
  localStorage.setItem('sd_last_active', Date.now().toString());

  /* ── STEP 5: Idle logout timer ── */
  let idleTimer;

  function resetIdle(){
    clearTimeout(idleTimer);
    localStorage.setItem('sd_last_active', Date.now().toString());
    idleTimer = setTimeout(async function(){
      await client.auth.signOut();
      clearSdStorage();
      goToLanding('idle_timeout');
    }, IDLE_MS);
  }

  ['mousemove','keydown','click','touchstart','scroll'].forEach(function(e){
    document.addEventListener(e, resetIdle, { passive: true });
  });

  resetIdle(); // kick off

  /* ── STEP 6: Listen for auth state changes (token refresh, signout) ── */
  client.auth.onAuthStateChange(function(event, sess){
    if(event === 'SIGNED_OUT' || !sess){
      clearSdStorage();
      goToLanding('signed_out');
    }
  });

  console.log('✅ Dashboard auth OK:', user.email);
})();
</script>
